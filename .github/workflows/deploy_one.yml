name: Deploy React to GitHub Pages

on:
   push:
      branches: [main] # Скрипт срабатывает при пуше в ветку main

permissions:
   contents: write

jobs:
   build-and-deploy:
      runs-on: ubuntu-latest
      steps:
         - name: Checkout 🛎️
           uses: actions/checkout@v3

         - name: Install and Build 🔧
           run: |
              cd frontend
              npm install
              npm run build
           env:
            VITE_API_URL: ${{ vars.VITE_API_URL }}
            
         - name: Deploy 🚀
           uses: JamesIves/github-pages-deploy-action@v4
           with:
              folder: frontend/dist # Папка, которую нужно опубликовать
              branch: gh-pages # Специальная ветка для хостинга
