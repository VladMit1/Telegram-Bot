<script>
   let tg = window.Telegram.WebApp;
   tg.expand();

   function add() {
      let nameInput = document.getElementById('name');
      let name = nameInput.value.trim();

      if (!name) return;

      // Отправляем данные боту (приложение закроется само)
      let data = {
         name: name,
         time: new Date().toLocaleTimeString([], {
            hour: '2-digit',
            minute: '2-digit',
         }),
      };

      tg.sendData(JSON.stringify(data));
      tg.close(); // Закрываем шторку после отправки
   }
</script>
